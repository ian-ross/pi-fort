# pi-fort project configuration
# See: https://github.com/ian-ross/pi-fort

# Enable pi-fort for this project.
enabled = true

# HTTP egress policy. By default, only configured secret/policy hosts
# plus package repository hosts are reachable. Set to true to allow
# HTTP egress to any public host while still applying policies to
# hosts listed in [hosts].
# allow_egress = false

# Optional guest distro and custom Gondolin image tag or asset path.
# Alpine is the default. Use distro = "debian" with a custom Debian image.
# Package names are distro-native; edit drop-ins when switching distros.
# distro = "alpine"
# image = "../images/pi-fort-large"

# Base packages (drop-in files in .pi/fort.d/ add more):
packages = ["git", "curl", "jq"]

# Mount directories outside the workspace (relative paths are resolved against
# this config file, supports ~). Missing paths are silently skipped. Mounts
# appear at the same path inside the VM unless target is set.
# mounts = [{ path = "../.git", readonly = false }, { path = "~/shared/configs", target = "/mnt/configs", readonly = true }]

# Environment variables available in the VM and setup scripts.
# Values can be static strings, host commands, or host env vars.
[env]
USER_NAME = { command = "git config --global user.name" }
USER_EMAIL = { command = "git config --global user.email" }

# Service policies live in .pi/fort.d/ as drop-in files.
# See .pi/fort.d/ for examples.

# Additional secrets:
# [secrets.OPENAI_API_KEY]
# env = "OPENAI_API_KEY"
# hosts = ["api.openai.com"]
